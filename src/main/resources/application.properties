spring.application.name=scm2.0

# Server Configuration
server.port=${SERVER_PORT:8081}
server.baseUrl=${BASE_URL:http://localhost:8081}

# Database Configuration
#spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:scm20}
#spring.datasource.username=${MYSQL_USER:root}
#spring.datasource.password=${MYSQL_PASSWORD:root}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


# JPA/Hibernate Configuration
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}


# ==================== Cloudinary Configuration ====================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api.key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:dummy}

# ==================== Email SMTP Configuration ====================
spring.mail.host=${EMAIL_HOST:localhost}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.domain_name=${EMAIL_DOMAIN:localhost}

# ==================== OAuth2 (Google, GitHub) ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=email,profile



# Profile Configuration
spring.profiles.active=${ACTIVE_PROFILE:prod}
logging.level.org.springframework.security.oauth2.client=DEBUG

# ==================== Cloudinary Configuration ====================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api.key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:dummy}

# ==================== Email SMTP Configuration ====================
spring.mail.host=${EMAIL_HOST:localhost}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.domain_name=${EMAIL_DOMAIN:localhost}

# ==================== OAuth2 (Google, GitHub) ====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=email,profile





