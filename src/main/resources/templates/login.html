<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">

<head>
  <title>Login | Team Task Manager</title>
</head>

<body>
<div id="content">

  <div class="relative min-h-[85vh] flex items-center justify-center px-4 py-12 overflow-hidden transition-colors duration-300">

    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-blue-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-30 animate-blob pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-purple-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-30 animate-blob animation-delay-2000 pointer-events-none"></div>

    <div class="relative w-full max-w-md bg-white/90 dark:bg-gray-800/90 backdrop-blur-xl border border-white/20 dark:border-gray-700 rounded-3xl shadow-2xl p-8 sm:p-10 transition-all duration-300 z-10">

      <div data-th-replace="~{message :: messagebox}" class="mb-4"></div>

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-lg mb-6 shadow-blue-500/30">
          <i class="fa-solid fa-right-to-bracket text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight break-words">
          Welcome Back
        </h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium break-words">
          Log in to manage your projects and tasks
        </p>
      </div>

      <div class="flex items-center gap-2 p-4 mb-6 text-sm text-red-800 rounded-xl bg-red-50 dark:bg-red-900/20 dark:text-red-400 border border-red-100 dark:border-red-800/30 break-words" th:if="${param.error}">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span class="font-medium">Invalid email or password.</span>
      </div>

      <div class="flex items-center gap-2 p-4 mb-6 text-sm text-green-800 rounded-xl bg-green-50 dark:bg-green-900/20 dark:text-green-400 border border-green-100 dark:border-green-800/30 break-words" th:if="${param.logout}">
        <i class="fa-solid fa-circle-check"></i>
        <span class="font-medium">You have been logged out securely.</span>
      </div>

      <form method="post" data-th-action="@{'/authenticate'}" class="space-y-5">

        <div>
          <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
            Email Address
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input id="email" name="email" type="email" placeholder="you@example.com"
                   class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500"
                   required />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5 px-1">
            <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 break-words">
              Password
            </label>
            <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors break-words">Forgot password?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input id="password" name="password" type="password" placeholder="••••••••"
                   class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500"
                   required />
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-4">
          <button type="submit"
                  class="w-full sm:w-2/3 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800 transition-all shadow-lg hover:-translate-y-0.5 shadow-blue-500/30 break-words">
            Sign In
          </button>
          <button type="reset"
                  class="w-full sm:w-1/3 bg-white text-gray-700 border-2 border-gray-200 py-3 rounded-xl font-bold hover:bg-gray-50 hover:border-gray-300 transition-all dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 shadow-sm break-words">
            Clear
          </button>
        </div>

      </form>

      <div class="flex items-center my-8">
        <div class="flex-grow h-px bg-gray-200 dark:bg-gray-700"></div>
        <span class="px-4 text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider break-words">Or continue with</span>
        <div class="flex-grow h-px bg-gray-200 dark:bg-gray-700"></div>
      </div>

      <div class="space-y-4">

        <a data-th-href="@{'/oauth2/authorization/google'}"
           class="group w-full flex items-center justify-center gap-3 bg-white border border-gray-200 dark:bg-gray-800 dark:border-gray-700 py-3 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-all shadow-sm hover:shadow-md font-bold text-gray-700 dark:text-gray-200 break-words">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 group-hover:scale-110 transition-transform" alt="Google" />
          Google
        </a>

        <a data-th-href="@{'/oauth2/authorization/github'}"
           class="group w-full flex items-center justify-center gap-3 bg-gray-900 text-white dark:bg-black dark:border dark:border-gray-700 py-3 rounded-xl hover:bg-gray-800 dark:hover:bg-gray-900 transition-all shadow-sm hover:shadow-md font-bold break-words">
          <i class="fa-brands fa-github text-xl group-hover:scale-110 transition-transform"></i>
          GitHub
        </a>

      </div>

      <div class="text-center mt-8 text-sm text-gray-600 dark:text-gray-400 font-medium break-words">
        New to Team Task Manager?
        <a data-th-href="@{/register}" class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 hover:underline font-bold ml-1 transition-colors break-words">
          Create an account
        </a>
      </div>

    </div>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      console.log("Team Task Manager Login page loaded");
  });
</script>

</body>

</html>
