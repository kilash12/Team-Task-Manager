<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
  <title>Messages | Team Task Manager</title>
</head>
<body>

<div id="content">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-screen">

    <div class="mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight break-words">
        Your Messages
      </h1>
      <p class="mt-2 text-gray-500 dark:text-gray-400 font-medium break-words">
        Stay connected with your network through Team Task Manager.
      </p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
      <div class="p-12 text-center">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-blue-50 dark:bg-blue-900/20 mb-6">
          <i class="fa-solid fa-comments text-4xl text-blue-500"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2 break-words">No messages yet</h2>
        <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto mb-8 break-words">
          The messaging feature is coming soon! You will be able to directly communicate with your contacts from within Team Task Manager.
        </p>
        <a href="/user/dashboard" class="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30 break-words">
          Back to Dashboard
        </a>
      </div>
    </div>

  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      console.log("Messages page loaded");
  });
</script>

</body>
</html>
