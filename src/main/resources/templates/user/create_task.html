<!DOCTYPE html>
<html th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Create Task | Team Task Manager</title>
</head>
<body>
<div id="content">
    <div th:replace="~{user/sidebar :: sidebar}"></div>
    <div class="sm:pl-64 pt-20 p-6 max-w-2xl mx-auto">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 border border-gray-200 dark:border-gray-700">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 break-words">Create New Task</h1>
            <form th:action="@{/user/tasks/create}" th:object="${task}" method="post">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 break-words">Title</label>
                    <input type="text" th:field="*{title}" required
                           class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 break-words">Description</label>
                    <textarea th:field="*{description}" rows="3"
                              class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-blue-500 transition-all resize-y"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 break-words">Project</label>
                    <select th:field="*{project.id}" required
                            class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition-all">
                        <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 break-words">Assign To</label>
                    <select name="assignedToId" required
                            class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition-all">
                        <option th:each="u : ${members}" th:value="${u.userId}" th:text="${u.name}"></option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 break-words">Due Date</label>
                    <input type="date" th:field="*{dueDate}" required
                           class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div class="flex gap-3">
                    <button type="submit"
                            class="bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-500/30 font-medium break-words">
                        Create Task
                    </button>
                    <a th:href="@{/user/tasks}"
                       class="bg-gray-300 dark:bg-gray-600 text-gray-800 dark:text-gray-200 px-5 py-2 rounded-xl hover:bg-gray-400 dark:hover:bg-gray-500 transition-all font-medium text-center break-words">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
