<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">

<head>
  <title>Update Profile | Team Task Manager</title>
</head>

<body>
<div id="content">

  <div class="relative min-h-[85vh] flex items-center justify-center px-4 py-12 overflow-hidden bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

    <div class="absolute top-0 right-1/4 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-blob pointer-events-none"></div>
    <div class="absolute bottom-0 left-1/4 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-blob animation-delay-4000 pointer-events-none"></div>

    <div class="relative w-full max-w-2xl bg-white/90 dark:bg-gray-800/90 backdrop-blur-xl border border-white/20 dark:border-gray-700 rounded-3xl shadow-2xl p-8 sm:p-10 transition-all duration-300 z-10">

      <div th:replace="~{message :: messagebox}" class="mb-4"></div>

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-lg mb-6 shadow-blue-500/30">
          <i class="fa-solid fa-user-pen text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight break-words">
          Update Your Profile
        </h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium break-words">
          Manage your account information and profile picture.
        </p>
      </div>

      <form th:action="@{'/user/profile/update'}" th:object="${profileForm}" method="post" enctype="multipart/form-data" class="space-y-6" novalidate>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
              Full Name
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                <i class="fa-regular fa-user"></i>
              </div>
              <input type="text" th:field="*{name}" placeholder="John Doe"
                     class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500" />
            </div>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
              Phone Number
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                <i class="fa-solid fa-phone"></i>
              </div>
              <input type="tel" th:field="*{phoneNumber}" placeholder="+1 234 567 890"
                     class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500" />
            </div>
            <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
          </div>

        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
            Email Address (Read-only)
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input type="email" th:value="${userEmail}" readonly
                   class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-100 border border-gray-200 text-gray-500 cursor-not-allowed dark:bg-gray-700/50 dark:border-gray-600 dark:text-gray-400 shadow-sm" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
            About You
          </label>
          <textarea rows="3" th:field="*{about}" placeholder="Tell us a little bit about yourself..."
                    class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm resize-y dark:placeholder-gray-500"></textarea>
          <p th:if="${#fields.hasErrors('about')}" th:errors="*{about}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
        </div>

        <div class="p-4 bg-gray-50 dark:bg-gray-700/30 rounded-2xl border border-gray-200 dark:border-gray-700">
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-3 ml-1 break-words">
            Update Profile Picture
          </label>
          <div class="flex flex-col sm:flex-row items-center gap-6">
            <div class="shrink-0 relative">
              <img th:src="${loggedInUser.profilePic}"
                   id="upload_image_preview"
                   class="w-24 h-24 object-cover rounded-2xl shadow-md border-4 border-white dark:border-gray-800"
                   alt="Current Profile Pic"
                   onerror="this.onerror=null; this.src='/images/logo.png'" />
            </div>
            <div class="flex-1 w-full">
              <input id="image_file_input" type="file" th:field="*{profileImage}" accept="image/*"
                     class="block w-full text-sm text-gray-900 border border-gray-300 rounded-xl cursor-pointer bg-white dark:text-gray-400 focus:outline-none dark:bg-gray-700 dark:border-gray-600 file:mr-4 file:py-2.5 file:px-4 file:rounded-l-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 dark:file:bg-gray-600 dark:file:text-white transition-all shadow-sm" />
              <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 ml-1 break-words">Leave empty to keep current picture.</p>
            </div>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-gray-200 dark:border-gray-700">
          <button type="submit"
                  class="w-full sm:w-2/3 bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800 transition-all shadow-lg hover:-translate-y-0.5 shadow-blue-500/30 break-words">
            Save Changes
          </button>
          <a th:href="@{/user/profile}"
             class="w-full sm:w-1/3 bg-white text-center text-gray-700 border-2 border-gray-200 py-3.5 rounded-xl font-bold hover:bg-gray-50 transition-all dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 shadow-sm break-words">
            Cancel
          </a>
        </div>

      </form>

    </div>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      const imageInput = document.querySelector("#image_file_input");
      const imagePreview = document.querySelector("#upload_image_preview");

      if (imageInput && imagePreview) {
          imageInput.addEventListener("change", function (event) {
              const file = event.target.files[0];
              if (file && file.type.startsWith('image/')) {
                  const reader = new FileReader();
                  reader.onload = function () {
                      imagePreview.setAttribute("src", reader.result);
                  };
                  reader.readAsDataURL(file);
              }
          });
      }
  });
</script>

</body>

</html>
