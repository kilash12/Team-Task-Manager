<!DOCTYPE html>
<html th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
    <title>Add Member | Team Task Manager</title>
</head>
<body>
<div id="content">
    <div th:replace="~{user/sidebar :: sidebar}"></div>
    <div class="sm:pl-64 pt-20 p-6 max-w-xl mx-auto">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow p-6">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 break-words">Add Team Member</h1>
            <form th:action="@{'/user/projects/' + ${projectId} + '/add-member'}" method="post">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1 break-words">Select User</label>
                    <select name="userId" required
                            class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 transition-all">
                        <option th:each="u : ${users}" th:value="${u.userId}" th:text="${u.name + ' (' + u.email + ')'}"></option>
                    </select>
                </div>
                <div class="flex gap-3">
                    <button type="submit"
                            class="bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-500/30 font-medium break-words">
                        Add Member
                    </button>
                    <a th:href="@{/user/projects}"
                       class="bg-gray-300 dark:bg-gray-600 text-gray-800 dark:text-gray-200 px-5 py-2 rounded-xl hover:bg-gray-400 dark:hover:bg-gray-500 transition-all font-medium text-center break-words">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
