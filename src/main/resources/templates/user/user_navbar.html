<nav data-th-fragment="user-navbar"
     class="fixed top-0 z-50 w-full bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-colors duration-300 shadow-sm">
  <div class="px-3 py-3 lg:px-5 lg:pl-3">
    <div class="flex items-center justify-between">

      <div class="flex items-center justify-start rtl:justify-end">
        <button data-drawer-target="logo-sidebar"
                data-drawer-toggle="logo-sidebar"
                aria-controls="logo-sidebar"
                type="button"
                class="inline-flex items-center p-2 text-sm text-gray-500 rounded-xl sm:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-800 dark:focus:ring-gray-700 transition-colors">
          <span class="sr-only">Open sidebar</span>
          <i class="fa-solid fa-bars text-xl"></i>
        </button>

        <a data-th-href="@{'/'}" class="flex items-center ms-2 md:ms-2 gap-3 group">
          <img data-th-src="@{'/images/logo.png'}"
               onerror="this.src='https://cdn-icons-png.flaticon.com/512/15/15874.png'"
               class="h-8 w-8 object-cover rounded-full shadow-sm group-hover:scale-110 transition-transform"
               alt="Logo" />
          <span class="self-center text-xl sm:text-2xl font-extrabold whitespace-nowrap text-gray-900 dark:text-white tracking-tight break-words">
            Team <span class="text-blue-600 dark:text-blue-400">Task Manager</span>
          </span>
        </a>
      </div>

      <div class="flex items-center gap-2 sm:gap-4">

        <div class="hidden lg:flex items-center space-x-1 font-medium mr-4">
          <a data-th-href="@{'/home'}" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg transition-all break-words">Home</a>
          <a data-th-href="@{'/about'}" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg transition-all break-words">About</a>
          <a data-th-href="@{'/services'}" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg transition-all break-words">Services</a>
          <a data-th-href="@{'/contact'}" class="px-4 py-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-lg transition-all break-words">Contact</a>
        </div>

        <button id="theme_change_button"
                class="flex items-center justify-center w-10 h-10 text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 transition-all shadow-sm">
          <i class="fa-solid fa-circle-half-stroke text-lg"></i>
        </button>

        <a data-th-href="@{'/user/profile'}"
           class="hidden md:flex items-center gap-2 pl-1 pr-4 py-1 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-all shadow-sm cursor-pointer">
          <img data-th-src="@{${loggedInUser.profilePic}}"
               onerror="this.onerror=null; this.src='/images/logo.png'"
               class="w-8 h-8 rounded-full object-cover border-2 border-white dark:border-gray-600 shadow-sm"
               alt="User">
          <span class="text-sm font-bold text-gray-800 dark:text-gray-200 truncate max-w-[120px] break-words" data-th-text="${loggedInUser.name}">User</span>
        </a>

        <a data-th-href="@{'/do-logout'}"
           class="hidden md:flex items-center justify-center w-10 h-10 rounded-xl bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 transition-all shadow-sm"
           title="Logout">
          <i class="fa-solid fa-power-off text-lg"></i>
        </a>

        <button data-collapse-toggle="navbar-cta"
                type="button"
                class="inline-flex items-center justify-center p-2 w-10 h-10 text-gray-500 rounded-xl lg:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-800 dark:focus:ring-gray-700 transition-colors"
                aria-controls="navbar-cta" aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
        </button>
      </div>
    </div>

    <div class="items-center justify-between hidden w-full lg:hidden mt-4" id="navbar-cta">
      <div class="flex flex-col p-4 border border-gray-100 rounded-2xl bg-gray-50 dark:bg-gray-800 dark:border-gray-700 space-y-2">

        <a data-th-href="@{'/home'}" class="block px-4 py-2.5 text-gray-900 rounded-xl hover:bg-gray-200 dark:text-white dark:hover:bg-gray-700 transition-colors font-medium break-words"><i class="fa-solid fa-house w-6 text-center mr-2 text-gray-400"></i> Home</a>
        <a data-th-href="@{'/about'}" class="block px-4 py-2.5 text-gray-900 rounded-xl hover:bg-gray-200 dark:text-white dark:hover:bg-gray-700 transition-colors font-medium break-words"><i class="fa-solid fa-circle-info w-6 text-center mr-2 text-gray-400"></i> About</a>
        <a data-th-href="@{'/services'}" class="block px-4 py-2.5 text-gray-900 rounded-xl hover:bg-gray-200 dark:text-white dark:hover:bg-gray-700 transition-colors font-medium break-words"><i class="fa-solid fa-briefcase w-6 text-center mr-2 text-gray-400"></i> Services</a>
        <a data-th-href="@{'/contact'}" class="block px-4 py-2.5 text-gray-900 rounded-xl hover:bg-gray-200 dark:text-white dark:hover:bg-gray-700 transition-colors font-medium break-words"><i class="fa-solid fa-envelope w-6 text-center mr-2 text-gray-400"></i> Contact</a>

        <hr class="border-gray-200 dark:border-gray-700 my-2">

        <a data-th-href="@{'/user/profile'}" class="flex items-center px-4 py-2.5 text-gray-900 rounded-xl hover:bg-blue-50 hover:text-blue-600 dark:text-white dark:hover:bg-gray-700 transition-colors font-bold break-words">
          <img data-th-src="@{${loggedInUser.profilePic}}" onerror="this.onerror=null; this.src='/images/logo.png'" class="w-6 h-6 rounded-full object-cover mr-3 border border-gray-300 dark:border-gray-600" alt="User">
          <span data-th-text="${loggedInUser.name}">My Profile</span>
        </a>
        <a data-th-href="@{'/do-logout'}" class="flex items-center px-4 py-2.5 text-red-600 rounded-xl hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20 transition-colors font-bold break-words">
          <i class="fa-solid fa-power-off w-6 text-center mr-2"></i> Logout
        </a>
      </div>
    </div>
  </div>
</nav>
