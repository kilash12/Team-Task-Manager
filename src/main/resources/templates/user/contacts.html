<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
  <title>All Contacts | Team Task Manager</title>
</head>
<body>

<div id="content">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <div class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl font-extrabold text-gray-900 dark:text-white tracking-tight mb-2 break-words">
        All Your Contacts
      </h1>
      <p class="text-sm sm:text-base text-gray-500 dark:text-gray-400 break-words">
        Manage, search, and organize your network seamlessly
      </p>
    </div>

    <div class="contacts_container">

      <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-6 bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">

        <form data-th-object="${contactSearchForm}" data-th-action="@{'/user/contacts/search'}" class="w-full md:w-auto">
          <div class="flex flex-col sm:flex-row gap-3 items-center">

            <select data-th-field="*{field}"
                    class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 block w-full sm:w-auto p-2.5 dark:bg-gray-700/50 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white transition-all cursor-pointer break-words">
              <option selected value="">Search By...</option>
              <option value="name">Name</option>
              <option value="phone">Phone Number</option>
              <option value="email">Email Address</option>
            </select>

            <div class="relative w-full sm:w-80 group">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none transition-colors group-focus-within:text-blue-500 text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
              </div>
              <input data-th-field="*{value}" type="text"
                     class="block w-full p-2.5 pl-10 text-sm text-gray-900 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 dark:bg-gray-700/50 dark:border-gray-600 dark:placeholder-gray-500 dark:text-white transition-all"
                     placeholder="Type to search...">
            </div>

            <button type="submit" class="w-full sm:w-auto px-6 py-2.5 bg-gray-900 text-white text-sm font-semibold rounded-xl hover:bg-gray-800 focus:ring-4 focus:ring-gray-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-all shadow-md break-words">
              Search
            </button>
          </div>
        </form>

        <button type="button" onclick="exportData()"
                class="w-full md:w-auto px-6 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 focus:ring-4 focus:ring-green-300 dark:bg-emerald-600 dark:hover:bg-emerald-500 transition-all shadow-md shadow-green-500/20 flex items-center justify-center gap-2 break-words">
          <i class="fa-solid fa-file-excel"></i> Export to Excel
        </button>
      </div>

      <div data-th-replace="~{message :: messagebox}"></div>

      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">

        <div data-th-if="${pageContact.totalElements > 0}" class="overflow-x-auto custom-scrollbar">
          <table id="contact-table" class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-gray-500 uppercase bg-gray-50/80 dark:bg-gray-700/50 dark:text-gray-300 border-b border-gray-100 dark:border-gray-700">
            <tr>
              <th scope="col" class="px-6 py-4 font-semibold tracking-wider">Name</th>
              <th scope="col" class="px-6 py-4 font-semibold tracking-wider">Phone</th>
              <th scope="col" class="px-6 py-4 font-semibold tracking-wider text-center">Links</th>
              <th scope="col" class="px-6 py-4 font-semibold tracking-wider text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr data-th-object="${c}" data-th-each="c : ${pageContact.getContent()}"
                class="bg-white border-b last:border-0 hover:bg-slate-50 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700/50 transition-colors group">

              <th scope="row" class="flex items-center px-6 py-4 text-gray-900 whitespace-nowrap dark:text-white">
                <div class="relative">
                  <img data-th-src="@{*{picture}}"
                       onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?background=3B82F6&color=fff&bold=true&size=64&name=' + encodeURIComponent('*{name}')"
                       class="w-11 h-11 rounded-full object-cover shadow-sm ring-2 ring-transparent group-hover:ring-blue-100 dark:group-hover:ring-gray-600 transition-all" alt="Avatar">
                  <div data-th-if="*{favorite}" class="absolute -top-1 -right-1 flex items-center justify-center w-4 h-4 bg-yellow-400 rounded-full border-2 border-white dark:border-gray-800 shadow-sm" title="Favorite">
                    <i class="fa-solid fa-star text-[8px] text-white"></i>
                  </div>
                </div>
                <div class="ps-4">
                  <div class="text-base font-bold text-gray-800 dark:text-gray-100 break-words" data-th-text="*{name}"></div>
                  <div class="text-xs font-medium text-gray-500 dark:text-gray-400 break-words" data-th-text="*{email}"></div>
                </div>
              </th>

              <td class="px-6 py-4">
                <div class="flex items-center text-gray-600 dark:text-gray-300 font-medium break-words">
                  <i class="fa-solid fa-phone-flip mr-2 text-gray-400 text-xs"></i>
                  <span data-th-text="*{phoneNumber}"></span>
                </div>
              </td>

              <td class="px-6 py-4">
                <div class="flex items-center justify-center gap-3">
                  <a data-th-href="@{*{websiteLink}}" target="_blank" rel="noopener noreferrer"
                     class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-blue-100 hover:text-blue-600 dark:bg-gray-700 dark:text-gray-400 dark:hover:bg-gray-600 dark:hover:text-blue-400 transition-all">
                    <i class="fa-solid fa-globe text-sm"></i>
                  </a>
                  <a data-th-href="@{*{linkedInLink}}" target="_blank" rel="noopener noreferrer"
                     class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-blue-100 hover:text-blue-600 dark:bg-gray-700 dark:text-gray-400 dark:hover:bg-gray-600 dark:hover:text-blue-400 transition-all">
                    <i class="fa-brands fa-linkedin-in text-sm"></i>
                  </a>
                </div>
              </td>

              <td class="px-6 py-4">
                <div class="flex items-center justify-center gap-2">
                  <button th:onclick="loadContactdata([[${c}]])" class="p-2 text-green-600 bg-green-50 hover:bg-green-100 rounded-lg dark:bg-green-900/20 dark:text-green-400 dark:hover:bg-green-900/40 transition-colors" title="View Details">
                    <i class="fa-solid fa-eye"></i>
                  </button>
                  <a data-th-href="@{'/user/contacts/view/'+*{id}}" class="p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg dark:bg-blue-900/20 dark:text-blue-400 dark:hover:bg-blue-900/40 transition-colors" title="Edit Contact">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </a>
                  <button th:onclick="deleteContact([[${c.id}]])" class="p-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg dark:bg-red-900/20 dark:text-red-400 dark:hover:bg-red-900/40 transition-colors" title="Delete Contact">
                    <i class="fa-solid fa-trash-can"></i>
                  </button>
                </div>
              </td>
            </tr>
            </tbody>
          </table>

          <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-100 dark:border-gray-700 flex justify-center">
            <nav aria-label="Page navigation">
              <ul class="inline-flex items-center -space-x-px text-sm shadow-sm rounded-lg overflow-hidden">
                <li data-th-unless="${pageContact.first}">
                  <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page=' + ${pageContact.number-1}}"
                     class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 bg-white border border-gray-200 hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white transition-colors break-words">
                    <i class="fa-solid fa-chevron-left mr-2 text-xs"></i> Prev
                  </a>
                </li>
                <li data-th-each="index : ${#numbers.sequence(0, pageContact.totalPages-1)}">
                  <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page='+${index}}"
                     data-th-classappend="${index == pageContact.number ? 'bg-blue-600 text-white border-blue-600 dark:bg-blue-600 dark:border-blue-600' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700'}"
                     class="flex items-center justify-center px-4 h-10 leading-tight border transition-colors font-medium break-words">
                    <span data-th-text="${index+1}"></span>
                  </a>
                </li>
                <li data-th-unless="${pageContact.last}">
                  <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page=' + ${pageContact.number+1}}"
                     class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 bg-white border border-gray-200 hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white transition-colors break-words">
                    Next <i class="fa-solid fa-chevron-right ml-2 text-xs"></i>
                  </a>
                </li>
              </ul>
            </nav>
          </div>
        </div>

        <div data-th-if="${pageContact.totalElements == 0}" class="text-center py-16 px-4">
          <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-blue-50 dark:bg-gray-700 mb-6">
            <i class="fa-regular fa-address-book text-4xl text-blue-500 dark:text-gray-400"></i>
          </div>
          <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2 break-words">No Contacts Found</h2>
          <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto mb-6 break-words">You haven't added any contacts yet, or your search didn't match any results.</p>
          <a data-th-href="@{/user/contacts/add}" class="inline-flex items-center px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-colors shadow-md break-words">
            <i class="fa-solid fa-plus mr-2"></i> Add New Contact
          </a>
        </div>

      </div>
    </div>
  </div>

  <div data-th-replace="~{user/contact_modals :: contact}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@linways/table-to-excel@1.0.4/dist/tableToExcel.min.js"></script>
<script data-th-src="@{'/js/contacts.js'}"></script>
<script>
  // Excel Export Logic
  function exportData() {
      const table = document.getElementById("contact-table");
      if(table) {
          TableToExcel.convert(table, {
              name: "TeamTaskManager_Contacts.xlsx",
              sheet: { name: "My Contacts" }
          });
      }
  }
</script>

</body>
</html>
