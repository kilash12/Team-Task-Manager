<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">

<head>
  <title>Create Account | Team Task Manager</title>
</head>

<body>
<div id="content">

  <div class="relative min-h-[85vh] flex items-center justify-center px-4 py-12 overflow-hidden transition-colors duration-300">

    <div class="absolute top-0 right-1/4 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-blob pointer-events-none"></div>
    <div class="absolute bottom-0 left-1/4 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-blob animation-delay-4000 pointer-events-none"></div>

    <div class="relative w-full max-w-2xl bg-white/90 dark:bg-gray-800/90 backdrop-blur-xl border border-white/20 dark:border-gray-700 rounded-3xl shadow-2xl p-8 sm:p-10 transition-all duration-300 z-10">

      <div th:replace="~{message :: messagebox}" class="mb-4"></div>

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-lg mb-6 shadow-blue-500/30">
          <i class="fa-solid fa-user-plus text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight break-words">
          Create an Account
        </h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium break-words">
          Join Team Task Manager and collaborate effectively.
        </p>
      </div>

      <form th:action="@{'/do-register'}" th:object="${userForm}" method="post" class="space-y-6" novalidate>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
              Full Name
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                <i class="fa-regular fa-user"></i>
              </div>
              <input type="text" th:field="*{name}" placeholder="John Doe"
                     class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500" />
            </div>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
          </div>

          <div>
            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
              Phone Number
            </label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
                <i class="fa-solid fa-phone"></i>
              </div>
              <input type="tel" th:field="*{phoneNumber}" placeholder="+1 234 567 890"
                     class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500" />
            </div>
            <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
          </div>

        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
            Email Address
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input type="email" th:field="*{email}" placeholder="you@example.com"
                   class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500" />
          </div>
          <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
            Password
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400 group-focus-within:text-blue-500 transition-colors">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" th:field="*{password}" placeholder="Create a strong password"
                   class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm dark:placeholder-gray-500" />
          </div>
          <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 ml-1 break-words">
            About You <span class="text-gray-400 font-normal">(Optional)</span>
          </label>
          <textarea rows="3" th:field="*{about}" placeholder="Tell us a little bit about yourself..."
                    class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white dark:bg-gray-900/50 dark:border-gray-600 dark:text-white dark:focus:bg-gray-700 transition-all shadow-sm resize-y dark:placeholder-gray-500"></textarea>
          <p th:if="${#fields.hasErrors('about')}" th:errors="*{about}" class="text-red-500 text-xs font-bold mt-1.5 ml-1 break-words"></p>
        </div>

        <div class="flex items-start pt-2 ml-1">
          <div class="flex items-center h-5">
            <input id="terms" type="checkbox" required
                   class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-blue-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-blue-600 dark:ring-offset-gray-800" />
          </div>
          <label for="terms" class="ml-2 text-sm font-medium text-gray-600 dark:text-gray-400 break-words">
            I agree to the <a href="#" class="text-blue-600 hover:underline dark:text-blue-400">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline dark:text-blue-400">Privacy Policy</a>.
          </label>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-gray-200 dark:border-gray-700">
          <button type="submit"
                  class="w-full sm:w-2/3 bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800 transition-all shadow-lg hover:-translate-y-0.5 shadow-blue-500/30 break-words">
            Sign Up Now
          </button>
          <button type="reset"
                  class="w-full sm:w-1/3 bg-white text-gray-700 border-2 border-gray-200 py-3.5 rounded-xl font-bold hover:bg-gray-50 hover:border-gray-300 transition-all dark:bg-gray-800 dark:text-gray-300 dark:border-gray-600 dark:hover:bg-gray-700 shadow-sm break-words">
            Clear
          </button>
        </div>

      </form>

      <div class="text-center mt-8 text-sm text-gray-600 dark:text-gray-400 font-medium break-words">
        Already have an account?
        <a th:href="@{/login}" class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 hover:underline font-bold ml-1 transition-colors break-words">
          Login here
        </a>
      </div>

    </div>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
      console.log("Team Task Manager Registration page loaded");
  });
</script>

</body>

</html>
