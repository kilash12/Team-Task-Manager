<nav data-th-fragment="navbar"

  <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between px-4 sm:px-6 lg:px-8 py-3.5">

    <a data-th-href="@{'/'}" class="flex items-center space-x-3 group">
      <img data-th-src="@{'/images/logo.png'}"
           onerror="this.src='https://cdn-icons-png.flaticon.com/512/15/15874.png'"
           class="h-9 w-9 rounded-full object-cover shadow-sm group-hover:scale-110 transition-transform duration-300"
           alt="Logo" />
      <span class="text-2xl font-extrabold text-gray-900 dark:text-white tracking-tight break-words">
        Team <span class="text-blue-600 dark:text-blue-400">Task Manager</span>
      </span>
    </a>

    <div class="flex items-center gap-3 md:order-2">

      <button id="theme_change_button"
              class="flex items-center justify-center w-10 h-10 text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 transition-all shadow-sm"
              title="Toggle Dark/Light Mode">
        <i class="fa-solid fa-circle-half-stroke text-lg"></i>
      </button>

      <a data-th-href="@{'/login'}"

        Login
      </a>

      <a data-th-href="@{'/register'}"

        Sign Up

              aria-controls="navbar-cta" aria-expanded="false">
        <span class="sr-only">Open main menu</span>
        <i class="fa-solid fa-bars text-xl"></i>
      </button>

    </div>

    <div class="hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">

        <li>
          <a data-th-href="@{'/home'}"
             class="block py-2.5 px-4 text-gray-700 rounded-xl hover:text-blue-600 hover:bg-blue-50 md:hover:bg-transparent md:p-0 dark:text-gray-300 dark:hover:text-blue-400 dark:hover:bg-gray-700 md:dark:hover:bg-transparent transition-colors font-semibold break-words">
            Home
          </a>
        </li>

        <li>
          <a data-th-href="@{'/about'}"
             class="block py-2.5 px-4 text-gray-700 rounded-xl hover:text-blue-600 hover:bg-blue-50 md:hover:bg-transparent md:p-0 dark:text-gray-300 dark:hover:text-blue-400 dark:hover:bg-gray-700 md:dark:hover:bg-transparent transition-colors font-semibold break-words">
            About
          </a>
        </li>

        <li>
          <a data-th-href="@{'/services'}"
             class="block py-2.5 px-4 text-gray-700 rounded-xl hover:text-blue-600 hover:bg-blue-50 md:hover:bg-transparent md:p-0 dark:text-gray-300 dark:hover:text-blue-400 dark:hover:bg-gray-700 md:dark:hover:bg-transparent transition-colors font-semibold break-words">
            Services
          </a>
        </li>

        <li>
          <a data-th-href="@{'/contact'}"
             class="block py-2.5 px-4 text-gray-700 rounded-xl hover:text-blue-600 hover:bg-blue-50 md:hover:bg-transparent md:p-0 dark:text-gray-300 dark:hover:text-blue-400 dark:hover:bg-gray-700 md:dark:hover:bg-transparent transition-colors font-semibold break-words">
            Contact
          </a>
        </li>

        <li class="md:hidden mt-3 pt-3 border-t border-gray-200 dark:border-gray-700">
          <a data-th-href="@{'/login'}"
             class="block py-2.5 px-4 text-center text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-xl mb-3 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors font-bold break-words">
            Login
          </a>
        </li>

        <li class="md:hidden">
          <a data-th-href="@{'/register'}"
             class="block py-2.5 px-4 text-center text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-colors font-bold shadow-md break-words">
            Sign Up
          </a>
        </li>

      </ul>
